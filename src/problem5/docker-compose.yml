name: problem5

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required in .env}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required in .env}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required in .env}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./api
    init: true
    restart: unless-stopped
    environment:
      API_PORT: ${API_PORT:?API_PORT is required in .env}
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required in .env}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required in .env}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in .env}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required in .env}
      WEB_ORIGIN: ${WEB_ORIGIN:?WEB_ORIGIN is required in .env}
      RATE_LIMIT_GLOBAL: ${RATE_LIMIT_GLOBAL:?RATE_LIMIT_GLOBAL is required in .env}
      RATE_LIMIT_MUTATIONS: ${RATE_LIMIT_MUTATIONS:?RATE_LIMIT_MUTATIONS is required in .env}
    ports:
      - "${API_PORT:?API_PORT is required in .env}:${API_PORT:?API_PORT is required in .env}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.API_PORT + '/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required in .env}
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required in .env}
      PORT: ${PORT:?PORT is required in .env}
      HOSTNAME: ${HOSTNAME:?HOSTNAME is required in .env}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required in .env}
    ports:
      - "${WEB_PORT:?WEB_PORT is required in .env}:${PORT:?PORT is required in .env}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/tasks').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
