name: problem5-test

# Separate stack for the test suite so it never touches dev data.
# Both services use tmpfs storage — wiped on container stop, and faster than
# disk fsync on every transaction. Different host ports than the dev stack
# so both can run side by side.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required in api/.env.test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in api/.env.test}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required in api/.env.test}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required in api/.env.test}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off", "-c", "full_page_writes=off"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s

  redis-test:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required in api/.env.test}:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
